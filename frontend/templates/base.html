<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>CursosApp</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #fdfdfd;
        font-family: "Patrick Hand", cursive;
      }

      /* Fondo tipo cuaderno */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 60px;
        width: 2px;
        height: 100%;
        background: #ff6b6b;
        opacity: 0.3;
      }

      body {
        background-image: repeating-linear-gradient(
          to bottom,
          #ffffff,
          #ffffff 28px,
          #dfe6e9 29px
        );
      }

      /* Sidebar */
      .sidebar {
        background: #fff8dc;
        border-right: 2px dashed #ccc;
      }

      /* Cards tipo nota */
      .card {
        background: #fffef2;
        border: 1px solid #e0dccc;
        border-radius: 10px;
        box-shadow: 2px 3px 0px rgba(0, 0, 0, 0.1);
        transform: rotate(-0.5deg);
      }

      .card:hover {
        transform: rotate(0deg) scale(1.02);
      }

      /* Inputs tipo escritura */
      input,
      textarea {
        background: transparent;
        border: none;
        border-bottom: 2px solid #999;
        border-radius: 0 !important;
        font-size: 18px;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-bottom: 2px solid #ff6b6b;
        box-shadow: none;
      }

      /* Botones estilo dibujado */
      .btn {
        background: none;
        border: 2px solid #000;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.2s;
      }

      .btn:hover {
        background: #000;
        color: #fff;
      }

      h1,
      h2,
      h3 {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <!-- Sidebar -->
      <div
        class="bg-dark text-white p-3"
        style="width: 250px; min-height: 100vh"
      >
        <h4 class="mb-4">🎓 Cursos</h4>

        <ul class="nav flex-column">
          <li class="nav-item mb-2">
            <a href="/" class="nav-link text-white">Inicio</a>
          </li>

          {% if user.is_authenticated %}
          <li class="nav-item mb-2">
            <a href="/dashboard/" class="nav-link text-white">Dashboard</a>
          </li>

          {% if user.es_instructor %}
          <li class="nav-item mb-2">
            <a href="/crear-curso/" class="nav-link text-white">Crear curso</a>
          </li>
          {% endif %}

          <li class="nav-item mt-3">
            <a href="/logout/" class="btn btn-danger w-100">Cerrar sesión</a>
          </li>
          {% else %}
          <li class="nav-item">
            <a href="/login/" class="btn btn-outline-light w-100 mb-2">Login</a>
            <a href="/registro/" class="btn btn-primary w-100">Registro</a>
          </li>
          {% endif %}
        </ul>
      </div>

      <!-- Contenido -->
      <div class="flex-grow-1 p-4">{% block content %}{% endblock %}</div>
    </div>
  </body>
</html>
