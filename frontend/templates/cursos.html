{% extends 'base.html' %} {% block content %}

<h3 class="mb-4">Explorar cursos</h3>

<div class="row">
  {% for curso in cursos %}
  <div class="col-md-3">
    <div class="card shadow-sm mb-4">
      <a
        href="/curso/{{ curso.id }}/"
        style="text-decoration: none; color: inherit"
      >
        {% if curso.imagen %}
        <img src="{{ curso.imagen.url }}" />
        {% endif %}
      </a>
      <div class="card-body">
        <h6 class="fw-bold">{{ curso.titulo }}</h6>
        <p class="text-muted small">{{ curso.descripcion|truncatewords:10 }}</p>

        {% if user.is_authenticated %}
        <a
          href="/inscribirse/{{ curso.id }}/"
          class="btn btn-primary btn-sm w-100"
        >
          Inscribirse
        </a>
        {% endif %}
      </div>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
